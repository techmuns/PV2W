# 2W industry data refresh (FADA retail + Vahan registrations).
#
# Ported from the standalone two-wheeler-dashboard repo. Runs in the
# two-wheeler-dashboard/ subfolder. industry/*.json is imported at build
# time, so we rebuild and commit the /2w/ bundle alongside the data.
name: 2W Refresh Industry Data (FADA + Vahan)

on:
  workflow_dispatch: {}
  schedule:
    # Monthly: 1st of the month, 04:13 UTC.
    - cron: '13 4 1 * *'

permissions:
  contents: write

concurrency:
  group: 2w-refresh-industry
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: two-wheeler-dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: two-wheeler-dashboard/package-lock.json

      - name: Install dependencies (incl. optional cheerio for scrapers)
        run: npm ci --include=optional

      - name: Fetch FADA monthly retail
        run: node scripts/fetch-fada.mjs || echo "FADA fetch failed — JSON marked as 'error', continuing"

      - name: Fetch Vahan registrations
        run: node scripts/fetch-vahan.mjs || echo "Vahan fetch flagged — JSON marked as 'requires_browser_session', continuing"

      - name: Rebuild /2w bundle (also verifies the build still passes)
        run: npm run build

      - name: Commit refreshed industry JSONs + rebuilt bundle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/industry/ ../2w
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: refresh FADA + Vahan industry pulls + rebuild /2w (auto)"
            git push
          fi
