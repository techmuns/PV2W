# 2W BSE filings scrape + AR text extraction.
#
# Ported from the standalone two-wheeler-dashboard repo into the
# two-wheeler-dashboard/ subfolder. Produces raw intermediate data
# (data/bse-*.json) and extracted AR text (src/data/source-text/) that
# feed the backfill scripts — none of which is imported at build time,
# so no /2w rebuild is needed here.
name: 2W BSE Company Scrape

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Optional slug to scrape just one OEM (tvs|bajaj|hero|eicher|ola-electric). Leave blank to scrape all 5.'
        required: false
        default: ''
  schedule:
    - cron: '0 1,14 * * *'
  push:
    branches: [main]
    paths:
      - 'two-wheeler-dashboard/scripts/scrape-bse-company.mjs'
      - 'two-wheeler-dashboard/scripts/extract-bse-ars.mjs'
      - '.github/workflows/2w-bse-scrape.yml'

permissions:
  contents: write

concurrency:
  group: 2w-bse-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: two-wheeler-dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape BSE (all OEMs, or only the one selected)
        env:
          ONLY: ${{ inputs.only }}
        run: |
          set -e
          # scripCode|slug pairs — 5 OEMs covered by the dashboard.
          OEMS=(
            "532343|tvs"
            "532977|bajaj"
            "500182|hero"
            "505200|eicher"
            "544225|ola-electric"
          )
          for pair in "${OEMS[@]}"; do
            scrip="${pair%%|*}"
            slug="${pair##*|}"
            if [ -n "$ONLY" ] && [ "$ONLY" != "$slug" ]; then
              echo "skipping $slug (only=$ONLY)"
              continue
            fi
            echo "=== $slug ($scrip) ==="
            node scripts/scrape-bse-company.mjs "$scrip" "$slug"
            sleep 3
          done

      - name: Install poppler-utils (for pdftotext)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Extract AR PDFs to text (gap years only)
        run: node scripts/extract-bse-ars.mjs

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bse-*.json data/bse-ar-extract-manifest.json src/data/source-text/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: refresh BSE scrape + extract AR text (auto)"
            git push
          fi
