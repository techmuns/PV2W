# 2W per-company financials refresh (Screener.in).
#
# Ported from the standalone two-wheeler-dashboard repo. Runs in the
# two-wheeler-dashboard/ subfolder. companies/*.json is imported at build
# time, so after refreshing data we rebuild the /2w/ bundle and commit it
# alongside the data — keeping the live dashboard in sync (a separate
# build workflow would NOT fire here, since GITHUB_TOKEN commits don't
# trigger other workflows).
name: 2W Refresh Data (Screener)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Screener ticker (e.g. TVSMOTOR, BAJAJ-AUTO, HEROMOTOCO, EICHERMOT, OLAELEC). Use ALL for every OEM. Leave blank for TVSMOTOR.'
        required: false
        default: 'TVSMOTOR'
  schedule:
    # Weekly: Monday 03:17 UTC.
    - cron: '17 3 * * 1'

permissions:
  contents: write

concurrency:
  group: 2w-refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: two-wheeler-dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: two-wheeler-dashboard/package-lock.json

      - name: Install dependencies (incl. optional cheerio for the scraper)
        run: npm ci --include=optional

      - name: Fetch from Screener
        env:
          TICKER: ${{ inputs.ticker || 'TVSMOTOR' }}
        run: |
          if [ "$TICKER" = "ALL" ]; then
            node scripts/fetch-screener.mjs TVSMOTOR BAJAJ-AUTO HEROMOTOCO EICHERMOT OLAELEC
          else
            node scripts/fetch-screener.mjs "$TICKER"
          fi

      - name: Rebuild /2w bundle (also verifies the build still passes)
        run: npm run build

      - name: Commit refreshed data + rebuilt bundle
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/companies/ ../2w
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: refresh Screener financials + rebuild /2w (auto)"
            git push
          fi
