# Live data refresh for the PV dashboard.
#
# Triggers (zero manual action required):
#   - Daily cron at 09:00 IST (03:30 UTC)
#   - Every push to main (skipping the bot's own data writes)
#   - Manual: Actions tab → "Run workflow"
#
# YEARLY AUTO-EXTENSION
# The extend-fys step runs first; once a calendar year crosses
# 1 April it adds the new FY to company_config.json so the
# dashboard FY selector, KPI strip, and Excel year columns all
# pick up the new fiscal year automatically. js/export.js also
# computes its own YEAR_END dynamically, so the Excel year band
# extends without code edits.
#
# DATA SOURCE CHAIN (all parsed automatically)
#   stock prices       — Yahoo NSE quote
#   monthly volumes    — Maruti / Hyundai / M&M / Tata press releases
#   industry totals    — SIAM
#   full P&L / BS / CF — Screener.in (per-OEM consolidated/standalone)
#   BS sub-lines       — Tijori → Tickertape → Trendlyne → Moneycontrol
#                        (priority order; first non-empty per cell wins)
#   PV-segment Tata    — tatamotors.com Q4 IP slides (curated seed)
#
# Each fetcher uses continue-on-error so one source failing doesn't
# kill the whole refresh. write-meta records every step's outcome
# and the timestamp into placeholder_data.json under _meta, so the
# dashboard can show "Last refreshed: 5 min ago" without the user
# opening GitHub.

name: Refresh dashboard data

on:
  schedule:
    - cron: '30 3 * * *'           # 03:30 UTC = 09:00 IST, every day
  workflow_dispatch:                 # manual trigger
  push:
    branches: [main]
    paths-ignore:
      - 'data/config/placeholder_data.json'   # don't loop on the bot's own data writes
      - 'data/config/raw_extracts.json'
      - 'data/config/company_config.json'     # auto-extended by extend-fys step
      - 'data/config/press_text/**'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ────────── auto-extend FY range ──────────
      # Once a year (after April 1st) this adds the new fiscal
      # year to company_config.json so the dashboard FY selector
      # / KPI strip / Excel export pick it up automatically.
      - name: Extend FY range for new fiscal year
        id: extend_fys
        continue-on-error: true
        run: node scripts/extend-fys.mjs

      # ────────── fetchers ──────────
      # continue-on-error: failures recorded into _meta, not fatal.

      - name: Stock prices (Yahoo Finance / NSE)
        id: stock
        continue-on-error: true
        run: node scripts/fetch-stock.mjs

      # 2W segment — Yahoo NSE close prices for the 6 listed 2W OEMs
      # (TVS / Bajaj Auto / Eicher Motors / Hero MotoCorp / Ola Electric
      # / Ather Energy). Honda / Yamaha / Suzuki India are private
      # subsidiaries and have no public share price. Writes into the
      # new `segment_metrics` block in placeholder_data.json per the
      # schema documented in data/config/segments_config.json.
      - name: 2W stock prices (Yahoo Finance / NSE)
        id: stock_2w
        continue-on-error: true
        run: node scripts/fetch-2w-stock.mjs

      # NOTE: scripts/fetch-maruti.mjs (Yahoo Finance quoteSummary) is
      # disabled — Yahoo's API rate-limits GitHub Actions runner IPs,
      # and the press-release fetcher below already covers Net Sales,
      # PAT, and FY volumes from Maruti's own published numbers.

      - name: Maruti FY24/FY25 sales + revenue (Maruti press releases)
        id: maruti_press
        continue-on-error: true
        run: node scripts/fetch-maruti-press.mjs

      - name: Hyundai FY24/FY25 financials + volumes (HMIL standalone PR)
        id: hyundai
        continue-on-error: true
        run: node scripts/fetch-hyundai.mjs

      - name: M&M FY24/FY25 auto + financials (Mahindra press releases)
        id: mm
        continue-on-error: true
        run: node scripts/fetch-mm.mjs

      - name: Tata Motors PV FY24/FY25 (Tata press releases, PV segment)
        id: tata
        continue-on-error: true
        run: node scripts/fetch-tata.mjs

      - name: Governance & Network (KMP / credit rating / dealers / employees)
        id: governance
        continue-on-error: true
        run: node scripts/fetch-governance.mjs

      - name: Industry totals (SIAM PV volume / mix / top gainer)
        id: industry
        continue-on-error: true
        run: node scripts/fetch-industry.mjs

      - name: Hyundai NSE quote (best-effort)
        id: hyundai_nse
        continue-on-error: true
        run: node scripts/fetch-hyundai-nse.mjs

      - name: M&M Screener.in financials (best-effort)
        id: mm_screener
        continue-on-error: true
        run: node scripts/fetch-mm-screener.mjs

      - name: Tijorifinance — Hyundai / M&M / Tata PV unit volumes (best-effort)
        id: tijori
        continue-on-error: true
        run: node scripts/fetch-tijori.mjs

      - name: Seed Total Sales Volume from SIAM × market share where missing
        id: seed_volumes
        continue-on-error: true
        run: node scripts/seed-volumes.mjs

      - name: Tata Motors Screener.in financials (best-effort, parent-level)
        id: tata_screener
        continue-on-error: true
        run: node scripts/fetch-tata-screener.mjs

      - name: Maruti Screener.in financials (best-effort)
        id: maruti_screener
        continue-on-error: true
        run: node scripts/fetch-maruti-screener.mjs

      - name: Hyundai Screener.in financials (best-effort, standalone)
        id: hyundai_screener
        continue-on-error: true
        run: node scripts/fetch-hyundai-screener.mjs

      - name: Tickertape balance-sheet sub-lines (best-effort)
        id: tickertape
        continue-on-error: true
        run: node scripts/fetch-tickertape.mjs

      - name: Trendlyne balance-sheet sub-lines (best-effort)
        id: trendlyne
        continue-on-error: true
        run: node scripts/fetch-trendlyne.mjs

      - name: Moneycontrol balance-sheet sub-lines (best-effort)
        id: moneycontrol
        continue-on-error: true
        run: node scripts/fetch-moneycontrol.mjs

      - name: Derive PAT Margin / Capex / Capex Intensity from Screener raw extracts
        id: derive_financials
        continue-on-error: true
        run: node scripts/derive-financials.mjs

      - name: Seed Maruti / Hyundai standalone PAT Margin + Capex Intensity (FY16-FY25)
        id: seed_financials
        continue-on-error: true
        run: node scripts/seed-financials.mjs

      - name: Seed operational mix (Export / EV / SUV / Launches) for Hyundai / M&M / Tata pre-FY23
        id: seed_operational
        continue-on-error: true
        run: node scripts/seed-operational.mjs

      - name: Seed Company_Info (KMP / dealers / employees / credit rating) for FY16-FY24
        id: seed_company_info
        continue-on-error: true
        run: node scripts/seed-company-info.mjs

      # ────────── stamp refresh status ──────────
      - name: Write _meta block (last refresh + per-fetcher status)
        run: node scripts/write-meta.mjs
        env:
          STOCK_OUTCOME:        ${{ steps.stock.outcome }}
          STOCK_2W_OUTCOME:     ${{ steps.stock_2w.outcome }}
          MARUTI_PRESS_OUTCOME: ${{ steps.maruti_press.outcome }}
          HYUNDAI_OUTCOME:      ${{ steps.hyundai.outcome }}
          MM_OUTCOME:           ${{ steps.mm.outcome }}
          TATA_OUTCOME:         ${{ steps.tata.outcome }}
          GOVERNANCE_OUTCOME:   ${{ steps.governance.outcome }}
          INDUSTRY_OUTCOME:     ${{ steps.industry.outcome }}
          HYUNDAI_NSE_OUTCOME:  ${{ steps.hyundai_nse.outcome }}
          MM_SCREENER_OUTCOME:  ${{ steps.mm_screener.outcome }}
          TIJORI_OUTCOME:       ${{ steps.tijori.outcome }}
          SEED_VOLUMES_OUTCOME: ${{ steps.seed_volumes.outcome }}
          TATA_SCREENER_OUTCOME:  ${{ steps.tata_screener.outcome }}
          MARUTI_SCREENER_OUTCOME:  ${{ steps.maruti_screener.outcome }}
          HYUNDAI_SCREENER_OUTCOME: ${{ steps.hyundai_screener.outcome }}
          DERIVE_FINANCIALS_OUTCOME: ${{ steps.derive_financials.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # ────────── commit & push ──────────
      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git add data/config/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: auto-refresh ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Rebase-and-push retry — handles the race where another
          # commit landed on main between the workflow's checkout
          # and this push step. Up to 4 attempts with backoff.
          for i in 1 2 3 4; do
            if git push origin main; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected on attempt $i — pulling --rebase and retrying"
            git pull --rebase origin main || { echo "rebase failed"; exit 1; }
            sleep $((i * 2))
          done
          echo "push failed after 4 attempts"
          exit 1
