# Deploy the PV "neha" Cloudflare Worker (static assets) to production.
#
# WHY THIS EXISTS
#   Cloudflare Workers Static Assets are uploaded at *deploy time* — the
#   live site serves the last-published snapshot, NOT the repo's HEAD.
#   The data-refresh workflows commit fresh JSON to main every day, but
#   without a deploy those commits never reach production, so the
#   dashboard shows stale numbers even though the data is "pulled in".
#   This workflow closes that gap: every change that lands on main is
#   republished automatically.
#
# ONE-TIME SETUP — add repository secrets under
#   Settings → Secrets and variables → Actions:
#     CLOUDFLARE_API_TOKEN   (required) — token with the
#                            "Edit Cloudflare Workers" template scope
#     CLOUDFLARE_ACCOUNT_ID  (only if the token spans multiple accounts)
#   Until CLOUDFLARE_API_TOKEN exists this workflow SKIPS the deploy: the
#   run stays green and GitHub sends no failure email. It starts publishing
#   automatically the moment the secret is added — no further edits needed.
#
# TRIGGERS
#   - push to main            — human merges / direct commits
#   - workflow_run completion — the refresh bots commit with GITHUB_TOKEN,
#                               whose pushes do NOT fire `push:` events, so
#                               we also redeploy when those workflows finish
#   - workflow_dispatch       — manual "Run workflow" button
name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_run:
    workflows:
      - "Refresh dashboard data"
      - "2W Refresh Data (Screener)"
      - "2W Refresh Industry Data (FADA + Vahan)"
      - "2W BSE Company Scrape"
      - "2W Build & Publish /2w"
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # push / manual always run; a workflow_run trigger only deploys when
    # the refresh it followed actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # Publishing needs CLOUDFLARE_API_TOKEN. When it isn't configured we
      # SKIP rather than fail: a red run here is not actionable — it just
      # makes GitHub email the repo owner on every refresh-bot commit, several
      # times a day. Skipping keeps the run green and silent; the deploy steps
      # below are gated on this check and resume automatically once the secret
      # is added, with no further edits.
      - name: Check Cloudflare credentials
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN repository secret is not set — skipping deploy (run left green, no failure email). Add it under Settings → Secrets and variables → Actions to enable publishing."
            echo "### ⏭️ Deploy skipped — CLOUDFLARE_API_TOKEN not configured" >> "$GITHUB_STEP_SUMMARY"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.creds.outputs.configured == 'true'
        run: npm install --no-audit --no-fund

      - name: Publish to Cloudflare Workers
        if: steps.creds.outputs.configured == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
